# ============================================================
# helm override：把 8 个控制面 NF 指向你自建的镜像 tag
# chart 结构 = 形态 A：images.repository(前缀) + images.tags.<nf>(名:tag)
# 最终镜像 = ghcr.io/omec-project/ + 5gc-<nf>:rel-<ver>-tycustom
#
# 只覆盖 8 个 NF；simapp/webui/mongodb/pod-init 等保持官方原版。
# pullPolicy 保持 IfNotPresent → 直接用 docker load 进来的本地镜像。
# ============================================================
images:
  repository: "ghcr.io/omec-project/"
  pullPolicy: IfNotPresent
  tags:
    amf:  5gc-amf:rel-3.1.0-tycustom
    ausf: 5gc-ausf:rel-3.0.0-tycustom
    nrf:  5gc-nrf:rel-3.0.0-tycustom
    nssf: 5gc-nssf:rel-3.0.0-tycustom
    pcf:  5gc-pcf:rel-3.0.0-tycustom
    smf:  5gc-smf:rel-4.1.0-tycustom
    udm:  5gc-udm:rel-3.0.0-tycustom
    udr:  5gc-udr:rel-3.0.0-tycustom
